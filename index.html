<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>MONITORING UA</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --accent: #00f2ff; 
            --bg: #05070a; 
            --panel: rgba(13, 17, 23, 0.85); 
            --border: rgba(0, 242, 255, 0.2);
            --danger: #ff003c;
            --tg-blue: #0088cc;
            --gold: #ffd700;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg); 
            font-family: 'JetBrains Mono', monospace; 
            color: #fff; overflow: hidden;
        }

        /* Анімований фон з сіткою */
        body::before {
            content: ""; position: absolute; inset: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.15; z-index: 0; pointer-events: none;
        }

        .wrapper { display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 1; }

        /* ФУТУРИСТИЧНА ШАПКА */
        .header { 
            height: 80px; display: flex; align-items: center; padding: 0 25px; 
            background: var(--panel); backdrop-filter: blur(20px); 
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        
        .brand { 
            font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 900; 
            color: var(--accent); text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .status-container {
            margin-left: 30px; padding-left: 20px; border-left: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 4px;
        }
        #kyiv-time { font-size: 24px; font-weight: 800; color: #fff; line-height: 1; }
        .sys-status { font-size: 10px; font-weight: 900; color: var(--danger); display: flex; align-items: center; gap: 8px; letter-spacing: 1px; }
        
        .blink-dot { 
            width: 10px; height: 10px; background: var(--danger); 
            border-radius: 50%; animation: pulse-red 1.5s infinite;
            box-shadow: 0 0 10px var(--danger);
        }
        @keyframes pulse-red { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.2; transform: scale(1.3); } }

        /* КНОПКИ */
        .btn-group { margin-left: auto; display: flex; gap: 15px; }
        .neon-btn {
            padding: 12px 20px; border-radius: 10px; text-decoration: none; 
            font-weight: 900; font-size: 12px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 10px;
        }
        .btn-tg { background: rgba(0, 136, 204, 0.2); color: #fff; border-color: var(--tg-blue); }
        .btn-tg:hover { background: var(--tg-blue); box-shadow: 0 0 20px var(--tg-blue); transform: translateY(-3px); }
        .btn-donate { background: var(--gold); color: #000; border: none; }
        .btn-donate:hover { box-shadow: 0 0 20px var(--gold); transform: translateY(-3px); }

        /* НАВІГАЦІЯ */
        .nav-container { 
            padding: 15px 20px; display: flex; gap: 12px; 
            background: rgba(0,0,0,0.3); overflow-x: auto; scrollbar-width: none;
        }
        .nav-container::-webkit-scrollbar { display: none; }
        
        .nav-btn {
            background: rgba(28, 33, 40, 0.8); border: 1px solid var(--border); color: #8b949e;
            padding: 14px 24px; border-radius: 12px; cursor: pointer; 
            font-weight: 800; font-size: 13px; transition: 0.3s;
            display: flex; align-items: center; gap: 10px; white-space: nowrap;
        }
        .nav-btn i { font-size: 16px; }
        .nav-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0, 242, 255, 0.05); }
        .nav-btn.active { 
            background: var(--accent); color: #000; 
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); border-color: #fff;
        }

        /* КАРТА */
        .viewport { 
            flex-grow: 1; margin: 0 15px 15px 15px; border-radius: 20px; 
            overflow: hidden; background: #000; border: 1px solid var(--border); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative; 
        }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; animation: fadeIn 0.5s ease; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* МОБІЛЬНА ВЕРСІЯ */
        @media (max-width: 768px) {
            .header { height: 70px; padding: 0 15px; }
            .brand { font-size: 12px; }
            #kyiv-time { font-size: 18px; }
            .btn-group span { display: none; }
            .neon-btn { padding: 10px; }
            .nav-container { padding: 10px; }
            .nav-btn { padding: 10px 16px; font-size: 11px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header class="header">
        <div class="brand"><br>MONITORING UA</div>
        
        <div class="status-container">
            <div id="kyiv-time">00:00:00</div>
            <div class="sys-status">
                <div class="blink-dot"></div> АКТИВНО
            </div>
        </div> 

        <div class="btn-group">
            <a href="https://t.me/manitoringkiev" target="_blank" class="neon-btn btn-tg">
                <i class="fa-brands fa-telegram"></i> <span>Telegram</span>
            </a>
            <a href="https://frames2.payhub.com.ua/moneybox?box_id=589cbce5-320d-4d3c-9abc-c4d388138564" target="_blank" class="neon-btn btn-donate">
                <i class="fa-solid fa-hryvnia-sign"></i> <span>ПРИТРИМКА ПРОЕКТА</span>
            </a>
        </div>
    </header>

    <main class="viewport">
        <iframe id="m1" class="active" src="https://alerts.in.ua/?theme=dark" allow="geolocation"></iframe>
        <iframe id="m2" src="https://deepstatemap.live/" allow="geolocation"></iframe>
        <iframe id="m3" src="https://globe.adsbexchange.com/" allow="geolocation"></iframe>
        <iframe id="m4" src="https://websdr.ewi.utwente.nl:8901/?tune=8847usb"></iframe>
        <iframe id="m5" src="https://www.windy.com/"></iframe>
    </main>
</div>

<script>
    // Функція перемикання вкладок
    function tab(id, btn) {
        document.querySelectorAll('iframe, .nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    // Оновлення годинника (Київ)
    function updateClock() {
        const now = new Date();
        const options = { 
            timeZone: 'Europe/Kyiv', 
            hour: '2-digit', 
            minute: '2-digit', 
            second: '2-digit', 
            hour12: false 
        };
        document.getElementById('kyiv-time').innerText = now.toLocaleTimeString('uk-UA', options);
    }

    setInterval(updateClock, 1000); 
    updateClock();
</script>

</body>
</html>
