<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En0T1k_UA // OSINT & STREAM</title>
    <style>
        body {
            background-color: #0d0221;
            color: #00ff41; /* Хакерський зелений */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            border: 2px solid #ff00ff;
            padding: 40px;
            background: rgba(13, 2, 33, 0.9);
            box-shadow: 0 0 20px #ff00ff, inset 0 0 10px #ff00ff;
            border-radius: 15px;
        }

        h1 {
            font-size: 3rem;
            text-shadow: 2px 2px #ff00ff;
            margin-bottom: 10px;
        }

        .glitch {
            position: relative;
            color: #fff;
            animation: glitch 1s linear infinite;
        }

        @keyframes glitch {
            2% { color: #ff00ff; left: 2px; }
            4% { color: #00ffff; left: -2px; }
            6% { color: #fff; left: 0; }
        }

        .status-box {
            background: #1a1a1a;
            padding: 10px;
            margin: 20px 0;
            border-left: 5px solid #00ff41;
        }

        .links {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        .btn {
            text-decoration: none;
            color: #0d0221;
            background: #00ff41;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ff00ff;
            color: #fff;
            transform: scale(1.1);
        }

        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="glitch">BURASIK HUB</h1>
        <p>--- [ SYSTEM STATUS: ONLINE ] ---</p>
        
        <div class="status-box">
            <p>> Стрімер: <strong>En0T1k_UA</strong></p>
            <p>> Локація: <strong>Ukraine</strong></p>
            <p>> Спеціалізація: <strong>Web-Dev & OSINT</strong></p>
        </div>

        <div class="links">
            <a href="#" class="btn">YOUTUBE</a>
            <a href="https://sky-monitor.fun" class="btn">SKY MONITOR</a>
            <a href="#" class="btn">STREAM</a>
        </div>
    </div>

    <div class="footer" style="margin-top: 20px; font-size: 0.8rem;">
        Detected Hardware: GTX 1050 Ti // Xeon E3-1240
    </div>

</body>
</html>
