<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Monitor | МОНІТОР НЕБА</title>
    
    <style>
        :root { 
            --accent: #00f2ff; 
            --bg: #0d1117; 
            --card: #161b22; 
            --danger: #ff003c;
            --support-green: #39d353;
            --gold: #ffd700;
        }

        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: var(--bg); font-family: 'Inter', sans-serif; 
            color: #fff; overflow: hidden;
            display: grid;
            grid-template-rows: 85px auto auto 1fr 30px; 
        }

        /* ШАПКА ТЕПЕР ЯК НА ПЕРШОМУ СКРІНІ */
        .header { 
            background: var(--card); border-bottom: 2px solid var(--accent);
            display: flex; align-items: center; padding: 0 20px; z-index: 10;
        }

        .brand { font-size: 14px; font-weight: 900; color: var(--accent); text-transform: uppercase; line-height: 1.2; }
        
        .status-box {
            margin-left: 20px; padding-left: 15px; border-left: 1px solid #30363d;
            display: flex; flex-direction: column; justify-content: center;
        }

        /* НОРМАЛЬНИЙ ВЕЛИКИЙ ГОДИННИК */
        #kyiv-time { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 26px; 
            font-weight: 800; 
            line-height: 1; 
            letter-spacing: 1px;
        }
        
        .sys-info { font-size: 10px; color: var(--danger); font-weight: 900; margin-top: 5px; display: flex; align-items: center; gap: 5px; }
        .dot { width: 6px; height: 6px; background: var(--danger); border-radius: 50%; box-shadow: 0 0 5px var(--danger); }

        /* КНОПКИ В ОДИН РЯД */
        .header-btns { margin-left: auto; display: flex; gap: 10px; }
        
        .btn-top {
            padding: 10px 15px; border-radius: 6px; text-decoration: none; 
            font-weight: 900; font-size: 11px; text-transform: uppercase;
            color: #fff; transition: 0.2s; border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-tg { background: #0088cc; }
        .btn-sup { background: var(--support-green); color: #000; }
        .btn-don { background: var(--gold); color: #000; }
        .btn-top:hover { filter: brightness(1.2); transform: translateY(-1px); }

        /* НАВІГАЦІЯ (ПІДНЯТА) */
        .nav { display: flex; gap: 8px; padding: 10px; background: rgba(0,0,0,0.5); overflow-x: auto; scrollbar-width: none; }
        .nav-btn {
            background: #21262d; border: 1px solid #30363d; color: #fff;
            padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 13px;
            white-space: nowrap; display: flex; align-items: center; gap: 8px;
        }
        .nav-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }

        .marquee { background: #000; color: var(--accent); font-size: 11px; padding: 6px; font-weight: bold; overflow: hidden; border-bottom: 1px solid #222; }
        .marquee-text { display: inline-block; animation: scroll 25s linear infinite; }
        @keyframes scroll { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }

        .viewport { position: relative; background: #000; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }

        .footer {
            background: #000; display: flex; align-items: center; justify-content: center;
            font-size: 10px; color: #555; border-top: 1px solid #222; font-weight: bold;
        }
        .footer b { color: var(--accent); margin: 0 5px; }
    </style>
</head>
