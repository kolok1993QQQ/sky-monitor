<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Sky Monitor | МОНІТОР НЕБА — Карта тривог та авіації</title>
    <meta name="description" content="Оперативний моніторинг неба, повітряних тривог та авіації у реальному часі. Професійний OSINT-центр.">
    <meta name="keywords" content="карта тривог, deepstate, моніторинг авіації, sky monitor, монітор неба, повітряна тривога онлайн">
    <meta name="author" content="Sky Monitor">
    <link rel="canonical" href="https://sky-monitor.fun">

    <style>
        :root { 
            --accent: #00f2ff; 
            --bg: #0d1117; 
            --card: rgba(22, 27, 34, 0.95); 
            --gold: #ffd700; 
            --tg-blue: #0088cc;
            --support-green: #39d353;
            --danger: #ff003c;
        }
        
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Inter', sans-serif; color: #fff; overflow: hidden; }
        .wrapper { display: flex; flex-direction: column; height: 100vh; }

        /* ШАПКА */
        .header { 
            height: 85px; display: flex; align-items: center; padding: 0 20px; 
            background: var(--card); backdrop-filter: blur(15px); 
            border-bottom: 2px solid var(--accent); z-index: 10;
        }
        
        .brand { font-size: 14px; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        
        /* КРАСИВИЙ ГОДИННИК ТА СТАТУС */
        .status-container {
            margin-left: 20px; padding-left: 15px; border-left: 1px solid #30363d;
            display: flex; flex-direction: column; gap: 2px;
        }
        #kyiv-time { 
            font-family: 'JetBrains Mono', monospace; font-size: 22px; 
            font-weight: 800; color: #fff; line-height: 1;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        .sys-status { 
            font-size: 10px; font-weight: 900; color: var(--danger); 
            display: flex; align-items: center; gap: 6px; text-transform: uppercase;
        }
        
        /* АНІМОВАНИЙ РАДАР */
        .radar-dot { 
            position: relative; width: 8px; height: 8px; background: var(--danger); 
            border-radius: 50%; box-shadow: 0 0 8px var(--danger);
        }
        .radar-dot::after {
            content: ''; position: absolute; top: -4px; left: -4px;
            width: 16px; height: 16px; border: 2px solid var(--danger);
            border-radius: 50%; animation: radar-pulse 1.5s infinite; opacity: 0;
        }
        @keyframes radar-pulse {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* БІЖУЧИЙ РЯДОК */
        .marquee-container {
            background: #000; color: var(--accent); padding: 6px 0;
            font-size: 11px; font-weight: 800; border-bottom: 1px solid #30363d;
            overflow: hidden; white-space: nowrap;
        }
        .marquee-text { display: inline-block; animation: marquee 25s linear infinite; }
        @keyframes marquee { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }

        /* КНОПКИ ШАПКИ */
        .btn-group { margin-left: auto; display: flex; gap: 10px; }
        .neon-btn {
            padding: 10px 14px; border-radius: 8px; text-decoration: none; 
            font-weight: 900; font-size: 11px; transition: 0.3s;
            text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-tg { background: var(--tg-blue); box-shadow: 0 0 15px rgba(0, 136, 204, 0.4); }
        .btn-support { background: var(--support-green); color: #000; box-shadow: 0 0 15px rgba(57, 211, 83, 0.4); }
        .btn-donate { background: var(--gold); color: #000; box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
        .neon-btn:hover { transform: translateY(-2px); filter: brightness(1.2); }

        /* НАВІГАЦІЯ ТА АНІМАЦІЯ СМАЙЛІВ */
        .nav-container { padding: 12px; display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; background: rgba(0,0,0,0.4); }
        .nav-btn {
            background: #1c2128; border: 1px solid #30363d; color: #8b949e;
            padding: 12px 20px; border-radius: 10px; cursor: pointer; 
            font-weight: 800; font-size: 13px; flex-shrink: 0; transition: 0.2s;
            display: flex; align-items: center; gap: 8px;
        }
        .nav-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); border-color: #fff; }

        /* Анімації для іконок */
        .ani-shake { display: inline-block; animation: shake 2s infinite ease-in-out; }
        .ani-fly { display: inline-block; animation: fly 3s infinite ease-in-out; }
        .ani-rotate { display: inline-block; animation: rotate 4s infinite linear; }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
        }
        @keyframes fly {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-4px) translateX(2px); }
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .nav-btn:hover .ani-shake { animation-duration: 0.5s; }

        /* В'ЮПОРТ */
        .viewport { flex-grow: 1; margin: 0 10px 10px 10px; border-radius: 15px; overflow: hidden; background: #000; border: 1px solid #30363d; box-shadow: 0 0 30px rgba(0,0,0,0.5); position: relative; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }
    </style>
</head>
<body>

<div class="wrapper">
    <header class="header">
        <div class="brand">Sky Monitor|<br>OSINT HUB</div>
        
        <div class="status-container">
            <div id="kyiv-time">00:00:00</div>
            <div class="sys-status">
                <div class="radar-dot"></div> СИСТЕМА АКТИВНА
            </div>
        </div>

        <div class="btn-group">
            <a href="https://t.me/manitoringkiev" target="_blank" class="neon-btn btn-tg">КАНАЛ</a>
            <a href="https://t.me/monitorkiev_bot" target="_blank" class="neon-btn btn-support">SUPPORT</a>
            <a href="https://send.monobank.ua/твоя_банка" target="_blank" class="neon-btn btn-donate">ДОНАТ ₴</a>
        </div>
    </header>

    <div class="marquee-container">
        <div class="marquee-text">
            СЛАВА УКРАЇНІ! 🇺🇦 СИСТЕМА ПРАЦЮЄ В РЕЖИМІ РЕАЛЬНОГО ЧАСУ... ПІДПИСУЙТЕСЬ НА ТЕЛЕГРАМ КАНАЛ @MANITORINGKIEV ДЛЯ ОПЕРАТИВНИХ ОПОВІЩЕНЬ... ПІДТРИМУЙТЕ ЗСУ...
        </div>
    </div>

    <nav class="nav-container">
        <button class="nav-btn active" onclick="tab('m1', this)"><span class="ani-shake">🚨</span> ТРИВОГИ</button>
        <button class="nav-btn" onclick="tab('m2', this)"><span class="ani-shake">⚔️</span> КАРТА</button>
        <button class="nav-btn" onclick="tab('m3', this)"><span class="ani-fly">✈️</span> АВІА</button>
        <button class="nav-btn" onclick="tab('m4', this)"><span class="ani-rotate">📻</span> РАДІО</button>
        <button class="nav-btn" onclick="tab('m5', this)"><span class="ani-shake">⛈️</span> ПОГОДА</button>
    </nav>

    <main class="viewport">
        <iframe id="m1" class="active" src="https://alerts.in.ua/?theme=dark"></iframe>
        <iframe id="m2" src="https://deepstatemap.live/"></iframe>
        <iframe id="m3" src="https://globe.adsbexchange.com/"></iframe>
        <iframe id="m4" src="https://websdr.ewi.utwente.nl:8901/?tune=8847usb"></iframe>
        <iframe id="m5" src="https://www.windy.com/"></iframe>
    </main>
</div>

<script>
    function tab(id, btn) {
        document.querySelectorAll('iframe, .nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }
    function updateClock() {
        document.getElementById('kyiv-time').innerText = new Date().toLocaleTimeString('uk-UA', { 
            timeZone: 'Europe/Kyiv', 
            hour12: false 
        });
    }
    setInterval(updateClock, 1000); updateClock();
</script>

</body>
</html>
