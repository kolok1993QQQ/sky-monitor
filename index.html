<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKY MONITOR | Мапа Тривог UA</title>
    <style>
        :root {
            --bg: #0f1014;
            --map-bg: #1a1b1f;
            --text: #e0e0e0;
            --border: #2a2a2e;
            --alarm: #e63946; /* Червоний колір тривоги */
            --safe: #2a2a2e;  /* Сірий колір, коли безпечно */
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        header {
            width: 100%;
            padding: 15px 30px;
            background: rgba(15, 16, 20, 0.9);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        h1 { margin: 0; font-size: 1.3rem; color: #fff; }
        #last-update { font-size: 0.8rem; color: #888; }

        .map-container {
            margin-top: 80px; /* Відступ від хедеру */
            width: 90%;
            max-width: 1000px;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Стилізація областей на карті */
        svg {
            width: 100%;
            height: 100%;
            fill: var(--safe);
            stroke: var(--bg);
            stroke-width: 0.5;
            transition: fill 0.5s ease;
        }

        /* Клас, який ми будемо додавати областям при тривозі */
        .is-alarm {
            fill: var(--alarm) !important;
        }

        path:hover {
            fill: #333;
            cursor: pointer;
        }

        .legend {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(26, 27, 31, 0.8);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 0.8rem;
        }

        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .color-box { width: 12px; height: 12px; border-radius: 3px; }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>Мапа повітряних тривог</h1>
            <div id="last-update">Оновлення...</div>
        </div>
        <div id="status-text" style="color: #00ff88;">✅ З'єднання встановлено</div>
    </header>

    <div class="map-container">
        <svg id="ukraine-map" viewBox="0 0 1000 660">
            <path id="UA-43" d="M850 580 C 860 590, 870 595, 880 590 L 900 600 C 910 610, 920 610, 930 600 L 940 580 C 930 570, 920 560, 910 560 L 890 570 L 880 560 L 870 570 Z"></path>
            <path id="UA-51" d="M720 550 L 740 560 L 750 580 C 760 590, 770 595, 780 590 L 800 600 C 810 610, 820 610, 830 600 L 840 580 C 830 570, 820 560, 810 560 L 790 570 L 780 560 L 770 570 Z"></path>
            <path id="UA-48" d="M780 520 L 800 530 L 820 520 L 830 540 L 820 560 L 800 570 L 780 560 L 770 550 Z"></path>
            <path id="UA-65" d="M830 540 L 850 550 L 860 570 C 870 580, 880 585, 890 580 L 910 590 C 920 600, 930 600, 940 590 L 950 570 C 940 560, 930 550, 920 550 L 900 560 L 890 550 L 880 560 Z"></path>

            <path id="UA-53" d="M830 350 L 850 360 L 870 350 L 880 370 L 870 390 L 850 400 L 830 390 L 820 380 Z"></path>
            <path id="UA-59" d="M870 280 L 890 290 L 910 280 L 920 300 L 910 320 L 890 330 L 870 320 L 860 310 Z"></path>
            <path id="UA-74" d="M800 230 L 820 240 L 840 230 L 850 250 L 840 270 L 820 280 L 800 270 L 790 260 Z"></path>
            <path id="UA-32" d="M780 290 L 800 300 L 820 290 L 830 310 L 820 330 L 800 340 L 780 330 L 770 320 Z"></path>

            <path id="UA-77" d="M640 460 L 660 470 L 680 460 L 690 480 L 680 500 L 660 510 L 640 500 L 630 490 Z"></path>
        </svg>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="color-box" style="background: var(--alarm)"></div>Повітряна тривога</div>
        <div class="legend-item"><div class="color-box" style="background: var(--safe)"></div>Немає тривоги</div>
    </div>

    <script>
        const map = document.getElementById('ukraine-map');
        const updateText = document.getElementById('last-update');
        const statusText = document.getElementById('status-text');

        // Функція для отримання та оновлення даних
        async function fetchAlarms() {
            try {
                // Безкоштовне джерело даних про тривоги
                const response = await fetch('https://test-alerts-api.wialon.com/test-alerts.json');
                if (!response.ok) throw new Error("Помилка мережі");
                const data = await response.json();

                // 1. Спочатку скидаємо всі тривоги
                const allRegions = map.querySelectorAll('path');
                allRegions.forEach(region => region.classList.remove('is-alarm'));

                // 2. Якщо є активні тривоги — замальовуємо їх
                if (data.activeAlerts && data.activeAlerts.length > 0) {
                    data.activeAlerts.forEach(alertRegionCode => {
                        const regionPath = map.getElementById(alertRegionCode);
                        if (regionPath) {
                            regionPath.classList.add('is-alarm');
                        }
                    });
                }

                updateText.innerText = "Останнє оновлення: " + new Date().toLocaleTimeString();
                statusText.innerText = "✅ Оновлено";
                statusText.style.color = "#00ff88";

            } catch (error) {
                console.error("Помилка оновлення:", error);
                statusText.innerText = "❌ Помилка синхронізації";
                statusText.style.color = "#e63946";
            }
        }

        // Авто-оновлення кожні 20 секунд
        setInterval(fetchAlarms, 20000);
        fetchAlarms(); // Перший запуск
    </script>
</body>
</html>
