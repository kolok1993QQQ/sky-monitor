<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKY MONITOR | COMMAND CENTER</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(58, 123, 213, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 210, 255, 0.1) 0%, transparent 40%);
            color: #fff;
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Анімований фон з сіткою */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--glass-border) 1px, transparent 1px), linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            opacity: 0.2;
        }

        header {
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 5px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        main {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            padding: 5px 15px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .pulse {
            width: 8px; height: 8px; background: #00ff88; border-radius: 50%;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.95); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(0.95); opacity: 1; }
        }

        .target-item {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--primary);
            transition: 0.3s;
        }

        .target-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(5px);
        }

        .target-info h3 { font-size: 0.9rem; margin-bottom: 4px; }
        .target-info p { font-size: 0.75rem; color: #888; }

        .sidebar h2 { font-size: 1rem; margin-bottom: 20px; color: var(--primary); }

        .btn-link {
            display: block;
            text-decoration: none;
            color: #fff;
            padding: 15px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            margin-bottom: 10px;
            text-align: center;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .btn-link:hover {
            background: var(--primary);
            color: #000;
            font-weight: bold;
        }

        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Sky Monitor 2.0</div>
    </header>

    <main>
        <div class="card">
            <div class="status-badge">
                <div class="pulse"></div> LIVE MONITORING ACTIVE
            </div>
            <h2 style="margin-bottom: 20px;">Оперативна обстановка</h2>
            
            <div id="targets-list">
                <div style="color: #444; text-align: center; padding: 50px;">
                    Очікування даних з Telegram каналів...
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="card">
                <h2>Навігація</h2>
                <a href="#" class="btn-link">🔴 СТРІМ ЗАРАЗ</a>
                <a href="#" class="btn-link">📊 СТАТИСТИКА</a>
                <a href="#" class="btn-link">📂 АРХІВ ЦІЛЕЙ</a>
                
                <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--glass-border);">
                    <p style="font-size: 0.7rem; color: #555;">SYSTEM INFO:</p>
                    <p style="font-size: 0.7rem; color: #888;">CPU: Xeon E3-1240<br>GPU: GTX 1050 Ti</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function loadData() {
            try {
                const r = await fetch('launches.json?v=' + Math.random());
                const data = await r.json();
                const container = document.getElementById('targets-list');
                
                if (data.length > 0) {
                    container.innerHTML = data.map(t => `
                        <div class="target-item">
                            <div class="target-info">
                                <h3>${t.location}</h3>
                                <p>${t.type} • Напрямок: ${t.direction || 'Уточнюється'}</p>
                            </div>
                            <div style="font-size: 0.8rem; font-weight: bold; color: var(--primary);">${t.time}</div>
                        </div>
                    `).join('');
                }
            } catch (e) {}
        }
        setInterval(loadData, 5000);
        loadData();
    </script>
</body>
</html>
