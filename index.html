<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SKY MONITOR | COMMAND CENTER</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon: #00f2ff;
            --danger: #ff003c;
            --bg: #05070a;
            --glass: rgba(13, 17, 23, 0.85);
            --border: rgba(0, 242, 255, 0.2);
            --sidebar-w: 80px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg); font-family: 'JetBrains Mono', monospace; 
            color: #fff; overflow: hidden;
        }

        /* ФОНОВА СІТКА */
        body::before {
            content: ""; position: absolute; inset: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px; opacity: 0.1; z-index: 0; pointer-events: none;
        }

        .app-container { display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 1; }

        /* ШАПКА */
        header {
            height: 70px; background: var(--glass); backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--neon); display: flex; align-items: center;
            padding: 0 20px; gap: 15px; flex-shrink: 0; z-index: 100;
        }

        .menu-toggle {
            display: none; font-size: 24px; color: var(--neon); cursor: pointer;
            padding: 10px; border-radius: 8px; background: rgba(0, 242, 255, 0.05);
        }

        .logo {
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 18px;
            color: var(--neon); letter-spacing: 2px;
        }

        .clock-box {
            background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 6px;
            border-left: 3px solid var(--danger); margin-left: 10px;
        }
        #clock { font-size: 18px; font-weight: 800; color: #fff; }

        /* ГРУПА КНОПОК ЗВЕРХУ */
        .top-nav-buttons { margin-left: auto; display: flex; gap: 12px; }
        
        .header-btn {
            padding: 8px 16px; border-radius: 6px; text-decoration: none;
            font-size: 12px; font-weight: 800; text-transform: uppercase;
            display: flex; align-items: center; gap: 8px;
            transition: 0.3s; border: 1px solid transparent;
        }

        .btn-tg { 
            background: rgba(0, 136, 204, 0.1); color: #0088cc; border-color: #0088cc;
            box-shadow: 0 0 10px rgba(0, 136, 204, 0.2);
            animation: breathe 3s infinite;
        }
        .btn-tg:hover { background: #0088cc; color: #fff; box-shadow: 0 0 20px #0088cc; }

        .btn-donate { 
            background: rgba(255, 215, 0, 0.1); color: #ffd700; border-color: #ffd700;
        }
        .btn-donate:hover { background: #ffd700; color: #000; box-shadow: 0 0 20px #ffd700; }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        /* ОСНОВНА ЧАСТИНА */
        .content-wrap { display: flex; flex-grow: 1; overflow: hidden; position: relative; }

        /* БІЧНА ПАНЕЛЬ */
        aside {
            width: var(--sidebar-w); background: var(--glass);
            border-right: 1px solid var(--border); display: flex;
            flex-direction: column; align-items: center; padding: 25px 0; gap: 20px;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 99;
        }

        .nav-icon {
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: rgba(255,255,255,0.4); cursor: pointer;
            transition: 0.3s; border-radius: 12px; border: 1px solid transparent;
            position: relative;
        }

        .nav-icon:hover { color: var(--neon); background: rgba(0, 242, 255, 0.05); }
        .nav-icon.active {
            color: var(--neon); background: rgba(0, 242, 255, 0.1);
            border-color: var(--neon); box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
        }

        /* ЕКРАНИ */
        main { flex-grow: 1; padding: 15px; background: rgba(0,0,0,0.3); }
        .screen {
            width: 100%; height: 100%; border-radius: 15px; overflow: hidden;
            border: 1px solid var(--border); background: #000; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }

        /* МОБІЛЬНА ВЕРСІЯ */
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .logo { font-size: 14px; }
            .top-nav-buttons .header-btn span { display: none; } /* Ховаємо текст кнопок */
            
            aside {
                position: absolute; left: 0; top: 0; bottom: 0;
                transform: translateX(-100%); /* Схована за екраном */
                width: 90px; height: 100%; background: #0d1117;
            }
            aside.open { transform: translateX(0); box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
            
            main { padding: 8px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="menu-toggle" onclick="toggleSidebar()">
            <i class="fa-solid fa-bars"></i>
        </div>
        
        <div class="logo">SKY MONITOR</div>
        
        <div class="clock-box">
            <div id="clock">00:00:00</div>
        </div>

        <div class="top-nav-buttons">
            <a href="https://t.me/manitoringkiev" target="_blank" class="header-btn btn-tg">
                <i class="fa-brands fa-telegram"></i> <span>Telegram</span>
            </a>
            <a href="#" class="header-btn btn-donate">
                <i class="fa-solid fa-heart"></i> <span>Донат</span>
            </a>
        </div>
    </header>

    <div class="content-wrap">
        <aside id="sidebar">
            <div class="nav-icon active" onclick="tab('m1', this)">
                <i class="fa-solid fa-satellite-dish"></i>
            </div>
            <div class="nav-icon" onclick="tab('m2', this)">
                <i class="fa-solid fa-map-marked-alt"></i>
            </div>
            <div class="nav-icon" onclick="tab('m3', this)">
                <i class="fa-solid fa-plane-up"></i>
            </div>
            <div class="nav-icon" onclick="tab('m4', this)">
                <i class="fa-solid fa-radio"></i>
            </div>
            <div class="nav-icon" onclick="tab('m5', this)">
                <i class="fa-solid fa-cloud-bolt"></i>
            </div>
        </aside>

        <main onclick="closeSidebar()">
            <div class="screen">
                <iframe id="m1" class="active" src="https://alerts.in.ua/?theme=dark"></iframe>
                <iframe id="m2" src="https://deepstatemap.live/"></iframe>
                <iframe id="m3" src="https://globe.adsbexchange.com/"></iframe>
                <iframe id="m4" src="https://websdr.ewi.utwente.nl:8901/?tune=8847usb"></iframe>
                <iframe id="m5" src="https://www.windy.com/"></iframe>
            </div>
        </main>
    </div>
</div>

<script>
    // Функція перемикання розділів
    function tab(id, el) {
        document.querySelectorAll('iframe, .nav-icon').forEach(i => i.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        
        // Закриваємо меню після вибору на телефоні
        if(window.innerWidth <= 768) closeSidebar();
    }

    // Функції для бічної панелі на телефоні
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
    }

    // Годинник
    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('uk-UA', { 
            timeZone: 'Europe/Kyiv', 
            hour12: false 
        });
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
