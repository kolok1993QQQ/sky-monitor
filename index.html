<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Monitor | МОНІТОР НЕБА</title>
    
    <style>
        :root {
            --accent: #00f2ff;
            --bg: #0d1117;
            --card: #161b22;
            --danger: #ff003c;
        }

        /* Виправлення висоти: Grid замість Flex для стабільності */
        body, html {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: var(--bg); font-family: 'Inter', sans-serif;
            color: #fff; overflow: hidden;
            display: grid;
            grid-template-rows: 85px auto auto 1fr 30px; /* Чіткий розподіл місця */
        }

        .header {
            background: var(--card); border-bottom: 2px solid var(--accent);
            display: flex; align-items: center; padding: 0 20px; z-index: 10;
        }

        .brand { font-size: 14px; font-weight: 900; color: var(--accent); text-transform: uppercase; }
        
        .status { margin-left: 20px; padding-left: 15px; border-left: 1px solid #333; }
        #kyiv-time { font-size: 22px; font-weight: bold; font-family: monospace; }

        .nav { display: flex; gap: 8px; padding: 10px; background: #000; overflow-x: auto; scrollbar-width: none; }
        .nav-btn {
            background: #21262d; border: 1px solid #30363d; color: #fff;
            padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px;
        }
        .nav-btn.active { background: var(--accent); color: #000; }

        .marquee { background: #000; color: var(--accent); font-size: 11px; padding: 5px; white-space: nowrap; border-bottom: 1px solid #222; overflow: hidden; }
        .marquee-text { display: inline-block; animation: scroll 20s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* Контент займає все вільне місце */
        .viewport { position: relative; width: 100%; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }

        .footer {
            background: #000; display: flex; align-items: center; justify-content: center;
            font-size: 10px; color: #555; border-top: 1px solid #222; font-weight: bold;
        }
        .footer b { color: var(--accent); margin: 0 5px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="brand">Sky Monitor<br>OSINT HUB</div>
        <div class="status">
            <div id="kyiv-time">00:00:00</div>
            <div style="font-size: 9px; color: var(--danger);">● СИСТЕМА АКТИВНА</div>
        </div>
        <div style="margin-left: auto;">
            <a href="https://t.me/manitoringkiev" target="_blank" style="background: #0088cc; color: #fff; text-decoration: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; font-size: 12px;">TG КАНАЛ</a>
        </div>
    </header>

    <div class="marquee"><div class="marquee-text">СЛАВА УКРАЇНІ! 🇺🇦 МОНІТОРИНГ ПРАЦЮЄ... ПІДТРИМУЙТЕ ЗСУ...</div></div>

    <nav class="nav">
        <button class="nav-btn active" onclick="tab('m1', this)">🚨 ТРИВОГИ</button>
        <button class="nav-btn" onclick="tab('m2', this)">⚔️ КАРТА</button>
        <button class="nav-btn" onclick="tab('m3', this)">✈️ АВІА</button>
        <button class="nav-btn" onclick="tab('m4', this)">📻 РАДІО</button>
    </nav>

    <main class="viewport">
        <iframe id="m1" class="active" src="https://alerts.in.ua/"></iframe>
        <iframe id="m2" src="https://deepstatemap.live/"></iframe>
        <iframe id="m3" src="https://globe.adsbexchange.com/"></iframe>
        <iframe id="m4" src="https://websdr.ewi.utwente.nl:8901/"></iframe>
    </main>

    <footer class="footer">
        © 2026 Всі права захищені | Автор: <b>Burasik (En0T1k_UA)</b>
    </footer>

    <script>
        function tab(id, btn) {
            document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }
        function updateTime() {
            document.getElementById('kyiv-time').innerText = new Date().toLocaleTimeString('uk-UA', { 
                timeZone: 'Europe/Kyiv', hour12: false 
            });
        }
        setInterval(updateTime, 1000); updateTime();
    </script>
</body>
</html>
