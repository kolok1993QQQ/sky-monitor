    <style>
        :root { 
            --accent: #00f2ff; /* Циан */
            --bg: #080a0c; 
            --panel-bg: rgba(13, 17, 23, 0.8);
            --border-color: rgba(0, 242, 255, 0.15);
            --danger-red: #ff3e3e;
            --sidebar-width: 75px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg); 
            font-family: 'Inter', sans-serif; 
            color: #e6edf3; overflow: hidden;
        }

        /* Декоративная сетка на фоне */
        body::before {
            content: ""; position: absolute; inset: 0;
            background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
            background-size: 30px 30px; opacity: 0.2; pointer-events: none; z-index: 0;
        }

        .app-wrapper {
            display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 1;
        }

        /* МОДУЛЬНАЯ ШАПКА */
        .top-bar {
            height: 60px; display: flex; align-items: center; padding: 0 20px;
            background: var(--panel-bg); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color); flex-shrink: 0;
        }
