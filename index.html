<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Моніторинг</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; }
        #map { height: 100vh; width: 100vw; }
        .controls { position: absolute; top: 10px; left: 10px; z-index: 1000; background: #000; color: #fff; padding: 10px; border: 1px solid #f00; }
        .leaflet-tile-pane { filter: invert(100%) hue-rotate(180deg) brightness(1.5) contrast(0.8); }
    </style>
</head>
<body>
    <div class="controls">
        <button onclick="setMode('uav')">✈️ Клік для Шахеда</button>
        <button onclick="clearMarkers()">Очистити все</button>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([49.0, 31.0], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const API_KEY = "eb5f64ff:206e35375c2c8dc5ef154faefa9f39f9";
        let mode = null;

        // 1. АВТОМАТИЧНІ ТРИВОГИ (через API)
        async function updateAlerts() {
            try {
                const response = await fetch("https://api.ukrainealarm.com/api/v3/alerts", {
                    headers: { "Authorization": "Bearer " + API_KEY }
                });
                const data = await response.json();
                console.log("Тривоги:", data);
            } catch(e) { console.error("Помилка API"); }
        }
        setInterval(updateAlerts, 30000);

        // 2. РУЧНЕ КЕРУВАННЯ (Рух цілей)
        function setMode(m) { mode = m; }
        map.on('click', function(e) {
            if (mode === 'uav') {
                L.marker(e.latlng, {
                    icon: L.divIcon({ html: '<div style="font-size:24px;">✈️</div>', iconSize: [30, 30] })
                }).addTo(map);
            }
        });

        function clearMarkers() { location.reload(); }
    </script>
</body>
</html>
