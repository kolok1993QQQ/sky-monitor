<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sky Monitor | МОНІТОР НЕБА</title>
    
    <style>
        :root { 
            --accent: #00f2ff; 
            --bg: #0d1117; 
            --card: rgba(22, 27, 34, 0.95); 
            --gold: #ffd700; 
            --tg-blue: #0088cc;
            --support-green: #39d353;
            --danger: #ff003c;
        }

        /* Гнучка сітка для всього екрана */
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: var(--bg); font-family: 'Inter', sans-serif; 
            color: #fff; overflow: hidden;
            display: grid;
            grid-template-rows: 85px auto auto auto 1fr 30px; /* Фіксовані зони + карта */
        }

        /* ШАПКА */
        .header { 
            background: var(--card); backdrop-filter: blur(15px); 
            border-bottom: 2px solid var(--accent);
            display: flex; align-items: center; padding: 0 20px; z-index: 10;
        }
        .brand { font-size: 14px; font-weight: 900; color: var(--accent); text-transform: uppercase; line-height: 1.2; }
        
        .status-container {
            margin-left: 20px; padding-left: 15px; border-left: 1px solid #30363d;
            display: flex; flex-direction: column; justify-content: center;
        }
        #kyiv-time { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 800; line-height: 1; }
        .sys-status { font-size: 10px; font-weight: 900; color: var(--danger); display: flex; align-items: center; gap: 6px; margin-top: 4px; }

        /* РАДАР */
        .radar-dot { position: relative; width: 8px; height: 8px; background: var(--danger); border-radius: 50%; }
        .radar-dot::after {
            content: ''; position: absolute; top: -4px; left: -4px; width: 16px; height: 16px;
            border: 2px solid var(--danger); border-radius: 50%; animation: radar-pulse 1.5s infinite; opacity: 0;
        }
        @keyframes radar-pulse { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

        /* КНОПКИ ТГ */
        .btn-group { margin-left: auto; display: flex; gap: 10px; }
        .neon-btn {
            padding: 8px 12px; border-radius: 8px; text-decoration: none; 
            font-weight: 900; font-size: 11px; text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.1); color: #fff; transition: 0.3s;
        }
        .btn-tg { background: var(--tg-blue); box-shadow: 0 0 10px rgba(0, 136, 204, 0.3); }
        .btn-support { background: var(--support-green); color: #000; }
        .btn-donate { background: var(--gold); color: #000; }

        /* БІЖУЧИЙ РЯДОК */
        .marquee-container { background: #000; color: var(--accent); padding: 5px 0; font-size: 11px; font-weight: 800; border-bottom: 1px solid #30363d; overflow: hidden; }
        .marquee-text { display: inline-block; animation: marquee 25s linear infinite; white-space: nowrap; }
        @keyframes marquee { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* НАВІГАЦІЯ */
        .nav-container { padding: 10px; display: flex; gap: 8px; background: rgba(0,0,0,0.3); overflow-x: auto; scrollbar-width: none; }
        .nav-btn {
            background: #1c2128; border: 1px solid #30363d; color: #8b949e;
            padding: 10px 16px; border-radius: 8px; cursor: pointer; 
            font-weight: 800; font-size: 13px; flex-shrink: 0; transition: 0.2s;
            display: flex; align-items: center; gap: 8px;
        }
        .nav-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); border-color: #fff; }

        /* АНІМАЦІЇ СМАЙЛІВ */
        .ani-shake { display: inline-block; animation: shake 2s infinite ease-in-out; }
        .ani-fly { display: inline-block; animation: fly 3s infinite ease-in-out; }
        @keyframes shake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(15deg); } 75% { transform: rotate(-15deg); } }
        @keyframes fly { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

        /* В'ЮПОРТ - КАРТА */
        .viewport { 
            margin: 5px 10px; border-radius: 12px; overflow: hidden; 
            background: #000; border: 1px solid #30363d; position: relative;
        }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }

        /* ФУТЕР - ЗАХИСТ ПРАВ */
        .footer {
            background: #000; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 800; color: #444; text-transform: uppercase;
            border-top: 1px solid #1c2128; z-index: 5;
        }
        .footer b { color: var(--accent); margin: 0 5px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="brand">Sky Monitor|<br>OSINT HUB</div>
        <div class="status-container">
            <div id="kyiv-time">0
