<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burasik | Digital Space</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .profile-img {
            width: 100px;
            height: 100px;
            background: linear-gradient(45deg, #00dbde, #fc00ff);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: #00ff88;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #00ff88;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="profile-img">E</div>
        <h1>En0T1k_UA</h1>
        <p><span class="dot"></span> Online Presence & Web Dev</p>
        
        <div class="nav-links">
            <a href="https://sky-monitor.fun" class="link-item">🛰 Sky Monitor Project</a>
            <a href="#" class="link-item">🎮 Gaming Stream</a>
            <a href="#" class="link-item">💻 GitHub Profile</a>
            <a href="#" class="link-item">📱 Telegram Channel</a>
        </div>
    </div>

</body>
</html>
