<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MONITORING UA</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --accent: #00f2ff; 
            --bg: #05070a; 
            --panel: rgba(13, 17, 23, 0.9); 
            --border: rgba(0, 242, 255, 0.2);
            --danger: #ff003c;
            --tg-blue: #0088cc;
            --gold: #ffd700;
            --success: #00ff66;
        }
        
        * { box-sizing: border-box; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg); 
            font-family: 'JetBrains Mono', monospace; 
            color: #fff; overflow: hidden;
        }

        /* Фонова сітка */
        body::before {
            content: ""; position: absolute; inset: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px; opacity: 0.1; z-index: 0; pointer-events: none;
        }

        .wrapper { display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 1; }

        .header { 
            height: 85px; display: flex; align-items: center; padding: 0 20px; 
            background: var(--panel); backdrop-filter: blur(10px); 
            border-bottom: 2px solid var(--accent);
        }
        
        .brand { 
            font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 900; 
            color: var(--accent); text-transform: uppercase; letter-spacing: 1px;
        }

        .info-block {
            margin-left: 15px; padding-left: 15px; border-left: 1px solid var(--border);
            display: flex; flex-direction: column; justify-content: center;
        }

        .label { font-size: 8px; font-weight: 900; color: #8b949e; text-transform: uppercase; margin-bottom: 2px; }
        
        .value { font-size: 18px; font-weight: 800; line-height: 1; }
        #online-count { color: var(--success); }
        #site-online { color: var(--accent); }

        .btn-group { margin-left: auto; display: flex; gap: 8px; }
        .neon-btn {
            padding: 8px 12px; border-radius: 6px; text-decoration: none; 
            font-weight: 800; font-size: 10px; text-transform: uppercase;
            display: flex; align-items: center; gap: 6px; border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-tg { background: rgba(0, 136, 204, 0.1); color: #fff; border-color: var(--tg-blue); }
        .btn-donate { background: var(--gold); color: #000; border: none; }

        .viewport { flex-grow: 1; margin: 10px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 850px) {
            .header { height: auto; padding: 10px; flex-wrap: wrap; justify-content: center; gap: 10px; }
            .brand { width: 100%; text-align: center; }
            .btn-group { width: 100%; justify-content: center; }
        }
    </
