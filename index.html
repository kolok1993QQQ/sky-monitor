<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Monitor | OSINT HUB</title>
    <style>
        :root { --accent: #00f2ff; --bg: #0d1117; --card: rgba(22, 27, 34, 0.95); --danger: #ff003c; --support-green: #39d353; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Inter', sans-serif; color: #fff; overflow: hidden; }
        .wrapper { display: flex; flex-direction: column; height: 100vh; }

        /* ШАПКА */
        .header { height: 70px; display: flex; align-items: center; padding: 0 20px; background: var(--card); border-bottom: 2px solid var(--accent); }
        .brand { font-size: 14px; font-weight: 900; color: var(--accent); text-transform: uppercase; }
        #kyiv-time { margin-left: 20px; font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 800; }

        /* ГОЛОВНА ЗОНА З ПАНЕЛЯМИ */
        .main-content { display: flex; flex-grow: 1; gap: 10px; padding: 10px; height: calc(100vh - 140px); }
        .side-panel { width: 250px; background: var(--card); border: 1px solid #30363d; border-radius: 10px; padding: 15px; overflow-y: auto; }
        .side-panel h3 { font-size: 11px; color: var(--accent); margin-top: 0; text-transform: uppercase; }
        
        /* ЦЕНТР */
        .viewport { flex-grow: 1; border-radius: 10px; overflow: hidden; border: 1px solid #30363d; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }

        /* НАВІГАЦІЯ ТА ФУНКЦІЇ */
        .nav-container { padding: 5px 10px; display: flex; gap: 10px; background: rgba(0,0,0,0.4); align-items: center; }
        .nav-btn { background: #1c2128; border: 1px solid #30363d; color: #8b949e; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .nav-btn.active { background: var(--accent); color: #000; font-weight: bold; }
        
        /* ЛОГ */
        #log-content { font-family: monospace; font-size: 10px; color: var(--support-green); line-height: 1.4; }
    </style>
</head>
<body>

<div class="wrapper">
    <header class="header">
        <div class="brand">EN0T1K_UA<br>MONITOR</div>
        <div id="kyiv-time">00:00:00</div>
    </header>

    <nav class="nav-container">
        <button class="nav-btn active" onclick="tab('m1', this)">🚨 ТРИВОГИ</button>
        <button class="nav-btn" onclick="tab('m2', this)">⚔️ КАРТА</button>
        <button class="nav-btn" onclick="tab('m3', this)">✈️ АВІА</button>
        <div style="margin-left: auto; display: flex; gap: 5px;">
            <button class="nav-btn" onclick="location.reload()" title="Оновити">🔄</button>
            <button class="nav-btn" onclick="toggleContrast()" style="background:#ffd700; color:#000;" title="Нічний режим">🕶️</button>
        </div>
    </nav>

    <div class="main-content">
        <aside class="side-panel">
            <h3>Системний лог</h3>
            <div id="log-content"></div>
        </aside>

        <main class="viewport">
            <iframe id="m1" class="active" src="https://alerts.in.ua/?theme=dark"></iframe>
            <iframe id="m2" src="https://deepstatemap.live/"></iframe>
            <iframe id="m3" src="https://globe.adsbexchange.com/"></iframe>
        </main>

        <aside class="side-panel">
            <h3>Корисні посилання</h3>
            <a href="https://t.me/manitoringkiev" style="color:var(--accent); font-size: 12px; display:block; margin-bottom:10px;">Telegram канал</a>
            <a href="https://t.me/monitorkiev_bot" style="color:var(--accent); font-size: 12px; display:block;">Бот сповіщень</a>
        </aside>
    </div>
</div>

<script>
    // Перемикання вкладок
    function tab(id, btn) {
        document.querySelectorAll('iframe, .nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    // Годинник
    setInterval(() => {
        document.getElementById('kyiv-time').innerText = new Date().toLocaleTimeString('uk-UA', { timeZone: 'Europe/Kyiv', hour12: false });
    }, 1000);

    // Кібер-лог
    const logs = ["SCANNING SECTOR 1...", "RADAR: ONLINE", "NETWORK: STABLE", "SATELLITE: SYNC...", "THREAT DETECTION: ACTIVE", "OSINT MODULE: READY"];
    function addLog() {
        const div = document.getElementById('log-content');
        const msg = logs[Math.floor(Math.random() * logs.length)];
        div.innerHTML = "> " + msg + "<br>" + div.innerHTML;
        if (div.innerHTML.length > 600) div.innerHTML = div.innerHTML.substring(0, 600);
    }
    setInterval(addLog, 2500);

    // Нічний режим
    function toggleContrast() {
        document.body.style.filter = document.body.style.filter === 'invert(1) hue-rotate(180deg)' ? 'none' : 'invert(1) hue-rotate(180deg)';
    }
</script>

</body>
</html>
