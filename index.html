<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKY MONITOR | Operational Dashboard</title>
    <style>
        :root {
            --bg-color: #0a0a0b;
            --panel-bg: #141417;
            --accent: #e63946; /* Колір тривоги */
            --text-main: #e0e0e0;
            --text-dim: #888;
            --border: #2a2a2e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-bg);
        }

        .logo {
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-indicator {
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        main {
            width: 90%;
            max-width: 1000px;
            margin-top: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--panel-bg);
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .target-list {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .target-header {
            padding: 15px 20px;
            background: #1c1c21;
            border-bottom: 1px solid var(--border);
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .target-item {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
        }

        .target-item:last-child { border-bottom: none; }

        .type-badge {
            background: rgba(230, 57, 70, 0.15);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            text-align: center;
            width: fit-content;
        }

        .location { font-weight: 600; }
        .time { color: var(--text-dim); text-align: right; font-size: 0.9rem; }

        .no-targets {
            padding: 40px;
            text-align: center;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <div class="live-indicator"></div>
            SKY MONITOR HUB
        </div>
        <div style="font-size: 0.8rem; color: var(--text-dim);">SOURCE: ПС ЗСУ / VANEK</div>
    </header>

    <main>
        <div class="stats-grid">
            <div class="stat-card">
                <div style="color: var(--text-dim); font-size: 0.8rem;">СТАТУС СИСТЕМИ</div>
                <div style="font-size: 1.2rem; margin-top: 5px; color: #00ff88;">АКТИВНО</div>
            </div>
            <div class="stat-card">
                <div style="color: var(--text-dim); font-size: 0.8rem;">ОБ'ЄКТІВ ПІД ПРИЦІЛОМ</div>
                <div id="target-count" style="font-size: 1.2rem; margin-top: 5px;">0</div>
            </div>
        </div>

        <div class="target-list">
            <div class="target-header">
                <span>ПОТОЧНІ ЦІЛІ</span>
                <span style="font-size: 0.7rem; letter-spacing: 1px;">REAL-TIME DATA</span>
            </div>
            <div id="targets-container">
                <div class="no-targets">Загроз не виявлено. Небо чисте.</div>
            </div>
        </div>
    </main>
