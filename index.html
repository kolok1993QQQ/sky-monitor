<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Карта повітряних тривог України</title>
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sky-monitor.fun/">
    <meta property="og:title" content="Карта повітряних тривог України">
    <meta property="og:description" content="Карта повітряних тривог України. Моніторинг повітряних тривог та авіації.">
    <meta property="og:image" content="https://sky-monitor.fun/logo.jpg">
    
    <link rel="canonical" href="https://sky-monitor.fun">
    <link rel="icon" href="https://sky-monitor.fun/favicon.ico" type="image/x-icon">
    
    <style>
        :root { --accent: #00f2ff; --bg: #0d1117; --card: rgba(22, 27, 34, 0.85); }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Inter', sans-serif; color: #fff; overflow: hidden; }
        .wrapper { display: flex; flex-direction: column; height: 100vh; }

        /* ШАПКА */
        .header { 
            height: 55px; display: flex; align-items: center; padding: 0 15px; 
            background: var(--card); backdrop-filter: blur(15px); 
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 2px 10px rgba(0, 242, 255, 0.2);
            z-index: 10;
        }
        .brand { font-size: 11px; font-weight: 900; color: var(--accent); line-height: 1.1; text-transform: uppercase; }
        #kyiv-time { margin-left: 15px; font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 900; color: #ff003c; text-shadow: 0 0 8px #ff003c; }

        /* ВІКНО КАРТИ */
        .viewport { flex-grow: 1; margin: 8px; border-radius: 15px; overflow: hidden; background: #000; border: 1px solid var(--accent); box-shadow: 0 0 20px rgba(0, 242, 255, 0.25); }
        iframe { width: 100%; height: 100%; border: none; }

        /* БІЖУЧИЙ РЯДОК З RSS */
        .marquee-container { background: #000; color: var(--accent); padding: 5px 0; font-size: 10px; font-weight: 800; border-bottom: 1px solid #30363d; overflow: hidden; white-space: nowrap; }
        .marquee-text { display: inline-block; animation: marquee 30s linear infinite; }
        @keyframes marquee { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>

<div class="wrapper">
    <header class="header">
        <div class="brand">MONITOR<br>UA</div>
        <div id="kyiv-time">00:00:00</div>
    </header>

    <main class="viewport">
        <iframe src="https://alerts.in.ua/?theme=dark"></iframe>
    </main>

    <div class="marquee-container">
        <div id="rss-feed" class="marquee-text">Підключення до каналу...</div>
    </div>
</div>

<script>
    // Час
    function updateClock() {
        document.getElementById('kyiv-time').innerText = new Date().toLocaleTimeString('uk-UA', { timeZone: 'Europe/Kyiv', hour12: false });
    }
    setInterval(updateClock, 1000); updateClock();

    // RSS Лента
    async function loadNews() {
        const rssUrl = "https://rssgenerator.mooo.com/feeds/?p=aaHR0cHM6Ly90Lm1lL21hbml0b3JpbmdraWV2";
        try {
            const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`);
            const data = await response.json();
            document.getElementById('rss-feed').innerText = data.items.map(i => i.title).join(" | 🇺🇦 | ");
        } catch(e) {
            document.getElementById('rss-feed').innerText = "Помилка завантаження новин, спробуйте пізніше.";
        }
    }
    loadNews();
    setInterval(loadNews, 300000); // Обновление каждые 5 минут
</script>

</body>
</html>
