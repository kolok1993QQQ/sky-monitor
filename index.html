<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Monitor | МОНІТОР НЕБА</title>
    <style>
        :root { --accent: #00f2ff; --bg: #0d1117; --card: rgba(22, 27, 34, 0.95); --danger: #ff003c; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: sans-serif; color: #fff; overflow: hidden; }
        .wrapper { display: flex; flex-direction: column; height: 100vh; }

        /* Адаптивна шапка */
        .header { height: auto; min-height: 60px; display: flex; align-items: center; padding: 10px; background: var(--card); border-bottom: 2px solid var(--accent); }
        .brand { font-size: 12px; font-weight: 900; color: var(--accent); white-space: nowrap; }
        
        .status-container { margin-left: 10px; font-size: 10px; }
        #kyiv-time { font-size: 16px; font-weight: 800; }
        
        .btn-group { margin-left: auto; display: flex; gap: 5px; }
        .neon-btn { padding: 6px 10px; border-radius: 5px; font-size: 9px; text-decoration: none; color: #fff; border: 1px solid var(--accent); }

        /* Горизонтальна навігація для мобільних */
        .nav-container { padding: 10px; display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; background: #000; }
        .nav-btn { background: #1c2128; color: #fff; padding: 8px 12px; border-radius: 8px; border: none; font-size: 11px; white-space: nowrap; }
        .nav-btn.active { background: var(--accent); color: #000; }

        /* Контент */
        .viewport { flex-grow: 1; position: relative; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }
    </style>
</head>
<body>

<div class="wrapper">
    <header class="header">
        <div class="brand">EN0T1K<br>MONITOR</div>
        <div class="status-container">
            <div id="kyiv-time">00:00:00</div>
            <div class="sys-status">АКТИВНА</div>
        </div>
        <div class="btn-group">
            <a href="https://t.me/manitoringkiev" class="neon-btn">TG</a>
            <a href="https://frames2.payhub.com.ua/moneybox?box_id=589cbce5-320d-4d3c-9abc-c4d388138564" class="neon-btn">₴</a>
        </div>
    </header>

    <main class="viewport">
        <iframe id="m1" class="active" src="https://alerts.in.ua/?theme=dark"></iframe>
        <iframe id="m2" src="https://deepstatemap.live/"></iframe>
        <iframe id="m3" src="https://globe.adsbexchange.com/"></iframe>
        <iframe id="m4" src="https://websdr.ewi.utwente.nl:8901/?tune=8847usb"></iframe>
        <iframe id="m5" src="https://www.windy.com/"></iframe>
    </main>
</div>

<script>
    function tab(id, btn) {
        document.querySelectorAll('iframe, .nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }
    setInterval(() => {
        document.getElementById('kyiv-time').innerText = new Date().toLocaleTimeString('uk-UA', { timeZone: 'Europe/Kyiv', hour12: false });
    }, 1000);
</script>
</body>
</html>
