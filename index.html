<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Sky Monitor | OSINT HUB</title>
    
    <style>
        :root { 
            --accent: #00f2ff; 
            --bg: #0d1117; 
            --card: rgba(22, 27, 34, 0.85); 
            --gold: #ffd700; 
            --tg-blue: #0088cc;
            --support-green: #39d353;
            --danger: #ff003c;
            --neon-shadow: 0 0 15px rgba(0, 242, 255, 0.5);
        }
        
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Inter', sans-serif; color: #fff; overflow: hidden; }
        .wrapper { display: flex; flex-direction: column; height: 100vh; }

        /* ШАПКА */
        .header { 
            height: 85px; display: flex; align-items: center; padding: 0 20px; 
            background: var(--card); backdrop-filter: blur(15px); 
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 5px 20px rgba(0, 242, 255, 0.2);
            z-index: 10;
        }
        
        .brand { font-size: 14px; font-weight: 900; color: var(--accent); text-transform: uppercase; text-shadow: 0 0 10px var(--accent); }
        
        #kyiv-time { 
            margin-left: 20px; font-family: 'JetBrains Mono', monospace; font-size: 22px; 
            font-weight: 800; color: #fff; text-shadow: 0 0 15px #fff, 0 0 20px var(--accent);
        }
        
        .sys-status { font-size: 10px; font-weight: 900; color: var(--danger); display: flex; align-items: center; gap: 6px; }

        /* БІЖУЧИЙ РЯДОК */
        .marquee-container {
            background: #000; color: var(--accent); padding: 8px 0;
            font-size: 11px; font-weight: 800; border-bottom: 1px solid var(--accent);
            text-shadow: 0 0 8px var(--accent);
            overflow: hidden; white-space: nowrap;
        }
        .marquee-text { display: inline-block; animation: marquee 25s linear infinite; }
        @keyframes marquee { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }

        /* НЕОНОВІ КНОПКИ */
        .btn-group { margin-left: auto; display: flex; gap: 10px; }
        .neon-btn {
            padding: 10px 14px; border-radius: 8px; text-decoration: none; 
            font-weight: 900; font-size: 11px; transition: 0.3s;
            text-transform: uppercase; border: 1px solid var(--accent);
            color: var(--accent); box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }
        .neon-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); }

        /* НАВІГАЦІЯ */
        .nav-container { padding: 12px; display: flex; gap: 10px; overflow-x: auto; background: rgba(0,0,0,0.4); }
        .nav-btn {
            background: #1c2128; border: 1px solid #30363d; color: #8b949e;
            padding: 12px 20px; border-radius: 10px; cursor: pointer; 
            font-weight: 800; font-size: 13px; transition: 0.3s;
        }
        .nav-btn.active { 
            background: var(--accent); color: #000; 
            box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent);
            border-color: #fff;
        }

        /* В'ЮПОРТ */
        .viewport { 
            flex-grow: 1; margin: 10px; border-radius: 15px; overflow: hidden; 
            background: #000; border: 2px solid var(--accent); 
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }
    </style>
</head>
<body>

<div class="wrapper">
    <header class="header">
        <div class="brand">MONITOR<br>UA</div>
        <div id="kyiv-time">00:00:00</div>
        <div class="btn-group">
            <a href="https://t.me/manitoringkiev" target="_blank" class="neon-btn">КАНАЛ</a>
            <a href="https://send.monobank.ua/твоя_банка" target="_blank" class="neon-btn">ДОНАТ ₴</a>
        </div>
    </header>

    <div class="marquee-container">
        <div class="marquee-text">
            СЛАВА УКРАЇНІ! 🇺🇦 СИСТЕМА ПРАЦЮЄ В РЕЖИМІ РЕАЛЬНОГО ЧАСУ... ПІДПИСУЙТЕСЬ НА ТЕЛЕГРАМ КАНАЛ @MANITORINGKIEV...
        </div>
    </div>

    <nav class="nav-container">
        <button class="nav-btn active" onclick="tab('m1', this)">🚨 ТРИВОГИ</button>
        <button class="nav-btn" onclick="tab('m2', this)">⚔️ КАРТА</button>
        <button class="nav-btn" onclick="tab('m3', this)">✈️ АВІА</button>
    </nav>

    <main class="viewport">
        <iframe id="m1" class="active" src="https://alerts.in.ua/?theme=dark"></iframe>
        <iframe id="m2" src="https://deepstatemap.live/"></iframe>
        <iframe id="m3" src="https://globe.adsbexchange.com/"></iframe>
        <iframe id="m4" src="https://websdr.ewi.utwente.nl:8901/?tune=8847usb"></iframe>
        <iframe id="m5" src="https://www.windy.com/"></iframe>
    </main>
</div>

<script>
    function tab(id, btn) {
        document.querySelectorAll('iframe, .nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }
    function updateClock() {
        document.getElementById('kyiv-time').innerText = new Date().toLocaleTimeString('uk-UA', { timeZone: 'Europe/Kyiv', hour12: false });
    }
    setInterval(updateClock, 1000); updateClock();
</script>
</body>
</html>
