<head>

    <title>Sky Monitor | COMMAND CENTER</title>
    <meta name="description" content="Оперативний моніторинг неба, повітряних тривог та авіації у реальному часі. Професійний OSINT-центр.">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --accent: #00f2ff; 
            --bg: #05070a; 
            --panel: rgba(13, 17, 23, 0.9); 
            --border: rgba(0, 242, 255, 0.2);
            --danger: #ff003c;
            --tg-blue: #0088cc;
            --gold: #ffd700;
            --sidebar-w: 80px;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg); 
            font-family: 'JetBrains Mono', monospace; 
            color: #fff; overflow: hidden;
        }

        /* ФОНОВАЯ СЕТКА */
        body::before {
            content: ""; position: absolute; inset: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px; opacity: 0.1; z-index: 0; pointer-events: none;
        }

        .wrapper { display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 1; }

        /* ШАПКА */
        .header { 
            height: 75px; display: flex; align-items: center; padding: 0 20px; 
            background: var(--panel); backdrop-filter: blur(15px); 
            border-bottom: 2px solid var(--accent); z-index: 100;
        }
        
        .menu-toggle {
            display: none; font-size: 22px; color: var(--accent); cursor: pointer;
            padding: 10px; margin-right: 10px; border-radius: 8px; background: rgba(0, 242, 255, 0.05);
        }

        .brand { 
            font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 900; 
            color: var(--accent); text-transform: uppercase; letter-spacing: 1px; 
        }

        .clock-box {
            margin-left: 20px; padding-left: 15px; border-left: 1px solid #30363d;
            display: flex; flex-direction: column;
        }
        #kyiv-time { font-size: 20px; font-weight: 800; color: #fff; line-height: 1; }
        .sys-status { font-size: 9px; font-weight: 900; color: var(--danger); display: flex; align-items: center; gap: 5px; margin-top: 4px; }
        
        .blink-dot { width: 7px; height: 7px; background: var(--danger); border-radius: 50%; animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* КНОПКИ В ШАПКЕ */
        .btn-group { margin-left: auto; display: flex; gap: 10px; }
        .neon-btn {
            padding: 10px 16px; border-radius: 8px; text-decoration: none; 
            font-weight: 800; font-size: 11px; transition: 0.3s;
            text-transform: uppercase; display: flex; align-items: center; gap: 8px;
        }
        .btn-tg { 
            background: rgba(0, 136, 204, 0.15); color: #fff; border: 1px solid var(--tg-blue);
            box-shadow: 0 0 10px rgba(0, 136, 204, 0.3); animation: breathe 3s infinite;
        }
        .btn-donate { background: var(--gold); color: #000; font-weight: 900; }
        
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); box-shadow: 0 0 15px var(--tg-blue); } }

        /* БЕГУЩАЯ СТРОКА */
        .marquee {
            background: #000; color: var(--accent); padding: 5px 0;
            font-size: 10px; font-weight: 800; border-bottom: 1px solid #30363d;
            overflow: hidden; white-space: nowrap;
        }
        .marquee-content { display: inline-block; animation: marquee 30s linear infinite; }
        @keyframes marquee { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }

        /* ОСНОВНОЙ КОНТЕНТ */
        .main-stage { display: flex; flex-grow: 1; overflow: hidden; position: relative; }

        /* БОКОВАЯ ПАНЕЛЬ */
        aside {
            width: var(--sidebar-w); background: var(--panel);
            border-right: 1px solid var(--border); display: flex;
            flex-direction: column; align-items: center; padding: 25px 0; gap: 20px;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 99;
        }
