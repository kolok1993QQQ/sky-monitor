<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Карта повітряних тривог України</title>
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sky-monitor.fun/">
    <meta property="og:title" content="Карта повітряних тривог України">
    <meta property="og:description" content="Карта повітряних тривог України. Моніторинг повітряних тривог та авіації.">
    <meta property="og:image" content="https://sky-monitor.fun/logo.jpg">
    
    <link rel="canonical" href="https://sky-monitor.fun">
    <link rel="icon" href="https://sky-monitor.fun/favicon.ico" type="image/x-icon">
    
    <style>
        :root { --accent: #00f2ff; --bg: #0d1117; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: sans-serif; color: #fff; overflow: hidden; }
        .viewport { width: 100vw; height: 100vh; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Оверлеї (адаптивні) */
        .overlay { position: absolute; z-index: 100; background: rgba(0, 0, 0, 0.8); border: 1px solid var(--accent); padding: 10px; border-radius: 8px; font-size: 12px; pointer-events: none; }
        #tg-overlay { top: 10px; left: 10px; width: 40%; }
        #targets-overlay { top: 10px; right: 10px; width: 40%; border-color: red; color: #ff4d4d; }
        .title { color: var(--accent); font-weight: bold; font-size: 10px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="viewport">
    <div id="tg-overlay" class="overlay">
        <div class="title">ОПЕРАТИВНО:</div>
        <div id="tg-content">Завантаження...</div>
    </div>
    
    <div id="targets-overlay" class="overlay">
        <div class="title" style="color: red;">ЦІЛІ В ПОВІТРІ:</div>
        <div id="targets-content">Немає</div>
    </div>

    <iframe src="https://alerts.in.ua/?theme=dark"></iframe>
</div>

<script>
    async function loadTg() {
        const feedUrl = "https://rss.app/feeds/buVZUROYCKje0Fdt.xml";
        try {
            const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}`);
            const data = await response.json();
            if (data.items && data.items.length > 0) {
                const text = data.items[0].title;
                document.getElementById('tg-content').innerText = text;
                document.getElementById('targets-content').innerText = text;
            }
        } catch(e) { console.error(e); }
    }
    loadTg(); 
    setInterval(loadTg, 45000);
</script>

</body>
</html>
