<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Моя Система Моніторингу</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0c0c0c; }
        #map { height: 100vh; width: 100vw; }
        /* Панель кнопок */
        .ui-panel { position: absolute; top: 20px; left: 20px; z-index: 1000; background: #1a1a1a; padding: 15px; border-radius: 8px; color: #fff; border: 1px solid #333; }
        .btn { display: block; margin: 5px 0; padding: 8px; background: #333; cursor: pointer; text-align: center; }
    </style>
</head>
<body>

<div class="ui-panel">
    <div onclick="toggleAlerts()" class="btn">🔴 Тривоги (API)</div>
    <div onclick="addUAV()" class="btn">✈️ Додати Шахед</div>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([49.0, 31.0], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const API_KEY = "eb5f64ff:206e35375c2c8dc5ef154faefa9f39f9";

    // Функція додавання Шахеда (клік по карті)
    function addUAV() {
        alert("Натисніть на карту, щоб поставити Шахед");
        map.once('click', function(e) {
            L.marker(e.latlng, {
                icon: L.divIcon({ html: '✈️', className: 'uav-icon', iconSize: [30, 30] })
            }).addTo(map);
        });
    }

    // Оновлення тривог
    async function toggleAlerts() {
        const res = await fetch("https://api.ukrainealarm.com/api/v3/alerts", {
            headers: { "Authorization": "Bearer " + API_KEY }
        });
        const data = await res.json();
        console.log("Тривоги отримано:", data);
        // Тут додається код для зафарбовування регіонів
    }
</script>
</body>
</html>
