<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Sky Monitor | МОНІТОР НЕБА — Карта тривог та авіації</title>
    <meta name="description" content="Оперативний моніторинг неба, повітряних тривог та авіації у реальному часі. Професійний OSINT-центр.">
    
    <style>
        :root { 
            --accent: #00f2ff; 
            --bg: #0d1117; 
            --card: rgba(22, 27, 34, 0.95); 
            --gold: #ffd700; 
            --tg-blue: #0088cc;
            --support-green: #39d353;
            --danger: #ff003c;
        }
        
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Inter', sans-serif; color: #fff; overflow: hidden; }
        .wrapper { display: flex; flex-direction: column; height: 100vh; }

        /* АДАПТИВНА ШАПКА */
        .header { 
            min-height: 70px; display: flex; align-items: center; padding: 10px 15px; 
            background: var(--card); backdrop-filter: blur(15px); 
            border-bottom: 2px solid var(--accent); z-index: 10;
            gap: 10px;
        }
        
        .brand { font-size: 11px; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; line-height: 1.2; }
        
        .status-container {
            margin-left: 5px; padding-left: 10px; border-left: 1px solid #30363d;
            display: flex; flex-direction: column; justify-content: center;
        }
        #kyiv-time { 
            font-family: 'JetBrains Mono', monospace; font-size: 18px; 
            font-weight: 800; color: #fff; line-height: 1;
        }
        .sys-status { 
            font-size: 9px; font-weight: 900; color: var(--danger); 
            display: flex; align-items: center; gap: 4px; text-transform: uppercase; margin-top: 3px;
        }
        
        .blink-dot { 
            width: 6px; height: 6px; background: var(--danger); 
            border-radius: 50%; animation: pulse-red 1s infinite;
        }
        @keyframes pulse-red {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* БІЖУЧИЙ РЯДОК (ОПТИМІЗОВАНИЙ) */
        .marquee-container {
            background: #000; color: var(--accent); padding: 4px 0;
            font-size: 10px; font-weight: 800; border-bottom: 1px solid #30363d;
            overflow: hidden; white-space: nowrap;
        }
        .marquee-text { display: inline-block; animation: marquee 20s linear infinite; }
        @keyframes marquee { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* КНОПКИ В ШАПЦІ (КОМПАКТНІ) */
        .btn-group { margin-left: auto; display: flex; gap: 6px; }
        .neon-btn {
            padding: 8px 10px; border-radius: 6px; text-decoration: none; 
            font-weight: 900; font-size: 10px; transition: 0.3s;
            text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
        }
        .btn-tg { background: var(--tg-blue); }
        .btn-support { background: var(--support-green); color: #000; }
        .btn-donate { background: var(--gold); color: #000; }

        /* НАВІГАЦІЯ (ГОРИЗОНТАЛЬНИЙ СКРОЛ) */
        .nav-container { 
            padding: 8px 10px; display: flex; gap: 8px; overflow-x: auto; 
            background: rgba(0,0,0,0.4); border-bottom: 1px solid #30363d;
            scrollbar-width: none; /* Firefox */
            -webkit-overflow-scrolling: touch;
        }
        .nav-container::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .nav-btn {
            background: #1c2128; border: 1px solid #30363d; color: #8b949e;
            padding: 10px 16px; border-radius: 8px; cursor: pointer; 
            font-weight: 800; font-size: 12px; flex-shrink: 0; transition: 0.2s;
            white-space: nowrap;
        }
        .nav-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 10px var(--accent); border-color: #fff; }

        /* В'ЮПОРТ (МАКСИМУМ МІСЦЯ) */
        .viewport { flex-grow: 1; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }

        /* Мобільні виключення */
        @media (max-width: 480px) {
            .brand { display: none; } /* Ховаємо текст зліва, щоб вліз годинник і кнопки */
            .header { padding: 5px 10px; min-height: 60px; }
            .btn-group { gap: 4px; }
            .neon-btn { padding: 6px 8px; font-size: 9px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header class="header">
        <div class="brand">EN0T1K_UA<br>MONITOR</div>
        
        <div class="status-container">
            <div id="kyiv-time">00:00:00</div>
            <div class="sys-status">
                <div class="blink-dot"></div> ACTIVE
            </div>
        </div>

        <div class="btn-group">
            <a href="https://t.me/manitoringkiev" target="_blank" class="neon-btn btn-tg">TG</a>
            <a href="https://t.me/monitorkiev_bot" target="_blank" class="neon-btn btn-support">HELP</a>
            <a href="https://send.monobank.ua/твоя_банка" target="_blank" class="neon-btn btn-donate">₴</a>
        </div>
    </header>

    <div class="marquee-container">
        <div class="marquee-text">
            СЛАВА УКРАЇНІ! 🇺🇦 СИСТЕМА ПРАЦЮЄ В РЕЖИМІ РЕАЛЬНОГО ЧАСУ... ПІДПИСУЙТЕСЬ НА ТЕЛЕГРАМ КАНАЛ @MANITORINGKIEV...
        </div>
    </div>

    <nav class="nav-container">
        <button class="nav-btn active" onclick="tab('m1', this)">🚨 ТРИВОГИ</button>
        <button class="nav-btn" onclick="tab('m2', this)">⚔️ КАРТА</button>
        <button class="nav-btn" onclick="tab('m3', this)">✈️ АВІА</button>
        <button class="nav-btn" onclick="tab('m4', this)">📻 РАДІО</button>
        <button class="nav-btn" onclick="tab('m5', this)">⛈️ ПОГОДА</button>
    </nav>

    <main class="viewport">
        <iframe id="m1" class="active" src="https://alerts.in.ua/?theme=dark"></iframe>
        <iframe id="m2" src="https://deepstatemap.live/"></iframe>
        <iframe id="m3" src="https://globe.adsbexchange.com/"></iframe>
        <iframe id="m4" src="https://websdr.ewi.utwente.nl:8901/?tune=8847usb"></iframe>
        <iframe id="m5" src="https://www.windy.com/"></iframe>
    </main>
</div>

<script>
    function tab(id, btn) {
        document.querySelectorAll('iframe, .nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }
    function updateClock() {
        document.getElementById('kyiv-time').innerText = new Date().toLocaleTimeString('uk-UA', { 
            timeZone: 'Europe/Kyiv', 
            hour12: false 
        });
    }
    setInterval(updateClock, 1000); updateClock();
</script>

</body>
</html>
