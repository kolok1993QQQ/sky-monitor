<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Monitor | МОНІТОР НЕБА</title>
    
    <style>
        :root { 
            --accent: #00f2ff; 
            --bg: #0d1117; 
            --card: #161b22; 
            --danger: #ff003c;
        }

        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: var(--bg); font-family: sans-serif; 
            color: #fff; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* ШАПКА */
        .header { 
            height: 80px; background: var(--card); 
            border-bottom: 2px solid var(--accent);
            display: flex; align-items: center; padding: 0 15px; flex-shrink: 0;
        }
        .brand { font-size: 12px; font-weight: bold; color: var(--accent); text-transform: uppercase; }
        
        .status {
            margin-left: 15px; padding-left: 15px; border-left: 1px solid #333;
        }
        #clock { font-size: 20px; font-weight: bold; }
        .live { font-size: 9px; color: var(--danger); display: flex; align-items: center; gap: 5px; }
        .dot { width: 6px; height: 6px; background: var(--danger); border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* НАВІГАЦІЯ */
        .nav { 
            display: flex; gap: 5px; padding: 10px; background: #000; 
            overflow-x: auto; flex-shrink: 0;
        }
        .nav-btn {
            background: #21262d; border: 1px solid #30363d; color: #c9d1d9;
            padding: 8px 12px; border-radius: 6px; cursor: pointer; white-space: nowrap;
            font-size: 12px; font-weight: bold;
        }
        .nav-btn.active { background: var(--accent); color: #000; }

        /* КАРТА */
        .content { flex-grow: 1; position: relative; background: #000; margin: 5px; border-radius: 8px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }

        /* ФУТЕР */
        .footer {
            height: 25px; background: #000; font-size: 9px;
            display: flex; align-items: center; justify-content: center;
            color: #555; border-top: 1px solid #1c2128;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="brand">Sky Monitor<br>OSINT HUB</div>
        <div class="status">
            <div id="clock">00:00:00</div>
            <div class="live"><div class="dot"></div> СИСТЕМА АКТИВНА</div>
        </div>
        <div style="margin-left: auto;">
            <a href="https://t.me/manitoringkiev" target="_blank" style="background:#0088cc; color:#fff; text-decoration:none; padding:8px; border-radius:5px; font-size:10px; font-weight:bold;">TG КАНАЛ</a>
        </div>
    </header>
