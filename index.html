<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Карта моніторингу</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; }
        #map { height: 100vh; width: 100vw; }
        
        /* Стиль панелі як на скриншоті */
        .controls { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: #1a1a1a; padding: 10px; border-radius: 5px; color: #fff; display: flex; gap: 10px; border: 1px solid #444; }
        .btn { background: #333; padding: 5px 15px; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

<div class="controls">
    <div>Рух об'єктів:</div>
    <div class="btn" onclick="toggleAlerts()">Тривоги</div>
    <div class="btn">ПС ЗСУ</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([49.0, 31.0], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const API_KEY = "eb5f64ff:206e35375c2c8dc5ef154faefa9f39f9";

    // Функція відображення тривог (червоні зони)
    async function toggleAlerts() {
        const response = await fetch("https://api.ukrainealarm.com/api/v3/alerts", {
            headers: { "Authorization": "Bearer " + API_KEY }
        });
        const data = await response.json();
        
        // Тут код перебирає регіони і малює червоні полігони
        alert("Запит до API відправлено. Дані отримано: " + data.length + " активних тривог.");
        // Додайте сюди логіку L.polygon для фарбування областей
    }
</script>
</body>
</html>
