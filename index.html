<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKY MONITOR | Мапа Тривог UA</title>
    <style>
        :root {
            --bg: #0f1014;
            --map-bg: #1a1b1f;
            --text: #e0e0e0;
            --border: #2a2a2e;
            --alarm: #e63946; /* Червоний колір тривоги */
            --safe: #2a2a2e;  /* Сірий колір, коли безпечно */
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        header {
            width: 100%;
            padding: 15px 30px;
            background: rgba(15, 16, 20, 0.9);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        h1 { margin: 0; font-size: 1.3rem; color: #fff; }
        #last-update { font-size: 0.8rem; color: #888; }

        .map-container {
            margin-top: 80px; /* Відступ від хедеру */
            width: 90%;
            max-width: 1000px;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Стилізація областей на карті */
        svg {
            width: 100%;
            height: 100%;
            fill: var(--safe);
            stroke: var(--bg);
            stroke-width: 0.5;
            transition: fill 0.5s ease;
        }

        /* Клас, який ми будемо додавати областям при тривозі */
        .is-alarm {
            fill: var(--alarm) !important;
        }

        path:hover {
            fill: #333;
            cursor: pointer;
        }

        .legend {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(26, 27, 31, 0.8);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 0.8rem;
        }

        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .color-box { width: 12px; height: 12px; border-radius: 3px; }
    </style>
</head>
