<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Sky Monitor | OSINT HUB — Карта тривог та авіації</title>
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sky-monitor.fun/">
    <meta property="og:title" content="Sky Monitor | OSINT HUB">
    <meta property="og:description" content="Професійний OSINT-хаб. Моніторинг повітряних тривог та авіації.">
    <meta property="og:image" content="https://sky-monitor.fun/logo.jpg">
    
    <link rel="canonical" href="https://sky-monitor.fun">
    <link rel="icon" href="https://sky-monitor.fun/favicon.ico" type="image/x-icon">
</head>
    
    <link rel="icon" href="https://sky-monitor.fun/favicon.ico" type="image/x-icon">
    <style>
        :root { --accent: #00f2ff; --bg: #0d1117; --card: rgba(22, 27, 34, 0.85); }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Inter', sans-serif; color: #fff; overflow: hidden; }
        .wrapper { display: flex; flex-direction: column; height: 100vh; }

        .header { 
            height: 85px; display: flex; align-items: center; padding: 0 20px; 
            background: var(--card); backdrop-filter: blur(15px); 
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 5px 20px rgba(0, 242, 255, 0.2);
            z-index: 10;
        }
        .brand { font-size: 14px; font-weight: 900; color: var(--accent); text-transform: uppercase; text-shadow: 0 0 10px var(--accent); }
        
       #kyiv-time { 
    margin-left: 20px; 
    font-family: 'JetBrains Mono', monospace; 
    font-size: 28px; 
    font-weight: 900; 
    color: #ff003c; /* Колір цифр */
    text-shadow: 0 0 10px #ff003c, 0 0 20px #ff003c, 0 0 30px #ff003c; /* Неонове сяйво */
    background: transparent; /* Прибрали фон */
    padding: 0; 
    border: none; /* Прибрали рамку */
    box-shadow: none; /* Прибрали будь-які тіні контейнера */
}

       .status-badge {
    margin-left: 15px;
    display: flex;
    align-items: center;
    gap: 6px;
}

.blink-dot {
    width: 8px;
    height: 8px;
    background: #ff003c; /* Червоний колір */
    border-radius: 50%;
    animation: pulse-red 1s infinite;
    box-shadow: 0 0 8px #ff003c;
}

.status-text {
    font-size: 10px;
    font-weight: 900;
    color: #39d353; /* Зелений колір "АКТИВНО" */
    text-transform: uppercase;
    letter-spacing: 1px;
}

@keyframes pulse-red {
    0% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(1.2); }
    100% { opacity: 1; transform: scale(1); }
} 
        
        .btn-group { margin-left: auto; display: flex; gap: 10px; }
        .neon-btn {
            padding: 10px 14px; border-radius: 8px; text-decoration: none; 
            font-weight: 900; font-size: 11px; transition: 0.3s;
            text-transform: uppercase; border: 1px solid var(--accent);
            color: var(--accent); box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }
        .neon-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); }

        .viewport { 
            flex-grow: 1; margin: 10px; border-radius: 15px; overflow: hidden; 
            background: #000; border: 2px solid var(--accent); 
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
<div class="wrapper">
  <header class="header">
    <div class="brand">MONITOR<br>UA</div>
    
    <div id="kyiv-time">00:00:00</div>
    
    <div class="status-badge">
        <div class="blink-dot"></div>
        <span class="status-text">АКТИВНО</span>
    </div>

    <div class="btn-group">
        <a href="https://t.me/manitoringkiev" target="_blank" class="neon-btn">КАНАЛ</a>
        <a href="https://send.monobank.ua/твоя_банка" target="_blank" class="neon-btn">ДОНАТ ₴</a>
    </div>
</header>

    <main class="viewport">
        <iframe id="m1" class="active" src="https://alerts.in.ua/?theme=dark"></iframe>
    </main>
</div>

<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('kyiv-time').innerText = now.toLocaleTimeString('uk-UA', { timeZone: 'Europe/Kyiv', hour12: false });
    }
    setInterval(updateClock, 1000); updateClock();
</script>
</body>
</html>
