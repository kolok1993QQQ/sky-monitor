<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Карта повітряних тривог України</title>
    
    <style>
        :root { --accent: #00f2ff; --bg: #0d1117; --card: rgba(22, 27, 34, 0.85); }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Inter', sans-serif; color: #fff; overflow: hidden; }
        .wrapper { display: flex; flex-direction: column; height: 100vh; }

        /* КОМПАКТНА ШАПКА */
        .header { 
            height: 55px; display: flex; align-items: center; padding: 0 15px; 
            background: var(--card); backdrop-filter: blur(15px); 
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 2px 10px rgba(0, 242, 255, 0.2);
            z-index: 10;
        }
        .brand { font-size: 11px; font-weight: 900; color: var(--accent); line-height: 1.1; text-transform: uppercase; }
        
        #kyiv-time { 
            margin-left: 15px; 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 20px; 
            font-weight: 900; 
            color: #ff003c;
            text-shadow: 0 0 8px #ff003c;
        }

        .status-badge { margin-left: 10px; display: flex; align-items: center; gap: 6px; }
        .blink-dot { width: 7px; height: 7px; background: #ff003c; border-radius: 50%; animation: pulse-red 1s infinite; box-shadow: 0 0 8px #ff003c; }
        .status-text { font-size: 9px; font-weight: 900; color: #39d353; text-transform: uppercase; }

        /* КНОПКИ */
        .btn-group { margin-left: auto; display: flex; }
        .neon-btn {
            padding: 6px 12px; border-radius: 6px; text-decoration: none; 
            font-weight: 900; font-size: 10px; transition: 0.3s;
            text-transform: uppercase; border: 1px solid var(--accent);
            color: var(--accent);
        }
        .neon-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }

        /* ВІКНО КАРТИ - З НЕОНОВИМ СВІТІННЯМ */
        .viewport { 
            flex-grow: 1; 
            margin: 8px; 
            border-radius: 15px; 
            overflow: hidden; 
            background: #000; 
            border: 1px solid var(--accent); 
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.25);
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* БІЖУЧИЙ РЯДОК */
        .marquee-container { background: #000; color: var(--accent); padding: 5px 0; font-size: 10px; font-weight: 800; border-bottom: 1px solid #30363d; overflow: hidden; white-space: nowrap; }
        .marquee-text { display: inline-block; animation: marquee 25s linear infinite; }
        @keyframes marquee { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }

        @keyframes pulse-red {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header class="header">
        <div class="brand">MONITOR<br>UA</div>
        <div id="kyiv-time">00:00:00</div>
        <div class="status-badge">
            <div class="blink-dot"></div>
            <span class="status-text">НЕ АКТИВНА СИСТЕМА ПО БпЛА</span>
        </div>
        <div class="btn-group">
            <a href="https://t.me/manitoringkiev" target="_blank" class="neon-btn">КАНАЛ</a>
        </div>
    </header>

    <main class="viewport">
        <iframe id="m1" src="https://alerts.in.ua/?theme=dark"></iframe>
    </main>

    <div class="marquee-container">
        <div class="marquee-text">
            СЛАВА УКРАЇНІ! 🇺🇦 СИСТЕМА ПРАЦЮЄ В РЕЖИМІ РЕАЛЬНОГО ЧАСУ... ПІДПИСУЙТЕСЬ НА ТЕЛЕГРАМ КАНАЛ @MANITORINGKIEV...
        </div>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('kyiv-time').innerText = now.toLocaleTimeString('uk-UA', { timeZone: 'Europe/Kyiv', hour12: false });
    }
    setInterval(updateClock, 1000); updateClock();
</script>

</body>
</html>
