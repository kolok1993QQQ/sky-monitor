<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Sky Monitor | МОНІТОР НЕБА</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --accent: #00f2ff; 
            --bg: #0d1117; 
            --card: rgba(22, 27, 34, 0.95); 
            --gold: #ffd700; 
            --tg-blue: #0088cc;
            --danger: #ff003c;
            --sidebar-w: 80px; /* Ширина бічної панелі для іконок */
        }
        
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Inter', sans-serif; color: #fff; overflow: hidden; }
        
        .wrapper { display: flex; flex-direction: column; height: 100vh; }

        /* ШАПКА */
        .header { 
            height: 70px; display: flex; align-items: center; padding: 0 20px; 
            background: var(--card); backdrop-filter: blur(15px); 
            border-bottom: 2px solid var(--accent); z-index: 10;
            flex-shrink: 0;
        }
        
        .brand { font-size: 14px; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        
        .status-container {
            margin-left: 20px; padding-left: 15px; border-left: 1px solid #30363d;
            display: flex; flex-direction: column;
        }
        #kyiv-time { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 800; }

        /* ОСНОВНИЙ КОНТЕЙНЕР З БІЧНОЮ ПАНЕЛЛЮ */
        .main-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        /* ЛІВА БІЧНА ПАНЕЛЬ */
        .sidebar {
            width: var(--sidebar-w);
            background: rgba(0,0,0,0.4);
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 15px;
            flex-shrink: 0;
        }

            width: 50px;
            height: 50px;
            background: #1c2128;
            border: 1px solid #30363d;
