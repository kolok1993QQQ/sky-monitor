<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sky Monitor | COMMAND CENTER</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --accent: #00f2ff; 
            --bg: #05070a; 
            --panel: rgba(13, 17, 23, 0.9); 
            --border: rgba(0, 242, 255, 0.2);
            --danger: #ff003c;
            --sidebar-w: 80px;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'JetBrains Mono', monospace; color: #fff; overflow: hidden; }

        /* ФОНОВА СІТКА */
        body::before {
            content: ""; position: absolute; inset: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px; opacity: 0.1; z-index: 0; pointer-events: none;
        }

        .wrapper { display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 1; }

        /* ШАПКА */
        header { 
            height: 75px; display: flex; align-items: center; padding: 0 20px; 
            background: var(--panel); backdrop-filter: blur(15px); 
            border-bottom: 2px solid var(--accent); z-index: 100;
        }
        
        .brand { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 900; color: var(--accent); }

        .clock-box { margin-left: 20px; padding-left: 15px; border-left: 1px solid var(--border); }
        #clock { font-size: 20px; font-weight: 800; }

        .btn-group { margin-left: auto; display: flex; gap: 10px; }
        .btn { padding: 10px 15px; border-radius: 8px; text-decoration: none; font-weight: 800; font-size: 11px; text-transform: uppercase; transition: 0.3s; }
        .btn-tg { border: 1px solid #0088cc; color: #fff; background: rgba(0, 136, 204, 0.1); }
        .btn-tg:hover { background: #0088cc; box-shadow: 0 0 15px #0088cc; }

        /* КОНТЕНТ */
        .main-stage { display: flex; flex-grow: 1; overflow: hidden; }

        aside {
            width: var(--sidebar-w); background: var(--panel); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 20px;
        }

        .nav-icon {
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: rgba(255,255,255,0.4); cursor: pointer; transition: 0.3s; border-radius: 12px;
        }
        .nav-icon.active { color: var(--accent); background: rgba(0, 242, 255, 0.1); border: 1px solid var(--accent); }

        .viewport { flex-grow: 1; padding: 15px; position: relative; }
        
        /* ЛЕГЕНДА (ТВОЯ КАРТИНКА) */
        .left-overlay { position: absolute; top: 25px; left: 25px; z-index: 10; pointer-events: none; }
        .overlay-card { 
            background: rgba(13, 17, 23, 0.9); border: 1px solid var(--border); 
            border-radius: 12px; padding: 12px; width: 180px; pointer-events: auto;
            margin-bottom: 10px;
        }
        .legend-item { display: flex; align-items: center; gap: 10px; font-size: 10px; margin-bottom: 5px; }

        .screen { width: 100%; height: 100%; border-radius: 15px; overflow: hidden; border: 1px solid var(--border); background: #000; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }

        @media (max-width: 768px) {
            aside { position: absolute; left: -100%; transition: 0.3s; }
            aside.open { left: 0; }
            .left-overlay { scale: 0.8; top: 10px; left: 10px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <div class="brand">EN0T1K_UA MONITOR</div>
        <div class="clock-box"><div id="clock">00:00:00</div></div>
        <div class="btn-group">
            <a href="https://t.me/manitoringkiev" class="btn btn-tg">Telegram</a>
        </div>
    </header>

    <div class="main-stage">
        <aside id="sidebar">
            <div class="nav-icon active" onclick="tab('m1', this)"><i class="fa-solid fa-radiation"></i></div>
            <div class="nav-icon" onclick="tab('m2', this)"><i class="fa-solid fa-map"></i></div>
            <div class="nav-icon" onclick="tab('m3', this)"><i class="fa-solid fa-plane"></i></div>
        </aside>

        <main class="viewport">
            <div class="left-overlay">
                <div class="overlay-card">
                    <div class="legend-item"><i class="fa-solid fa-bolt" style="color: #4caf50;"></i> Ракети</div>
                    <div class="legend-item"><i class="fa-solid fa-ghost" style="color: #ff5252;"></i> БпЛА</div>
                </div>
                <div class="overlay-card" style="background: #00c853; text-align: center; cursor: pointer;">
                    <span style="font-size: 10px; font-weight: 900;">GPS РАДАР</span>
                </div>
            </div>

            <div class="screen">
                <iframe id="m1" class="active" src="https://alerts.in.ua/?theme=dark" allow="geolocation"></iframe>
                <iframe id="m2" src="https://deepstatemap.live/" allow="geolocation"></iframe>
                <iframe id="m3" src="https://globe.adsbexchange.com/" allow="geolocation"></iframe>
            </div>
        </main>
    </div>
</div>

<script>
    function tab(id, btn) {
        document.querySelectorAll('iframe, .nav-icon').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }
    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('uk-UA', { timeZone: 'Europe/Kyiv', hour12: false });
    }
    setInterval(updateClock, 1000); updateClock();
</script>

</body>
</html>
